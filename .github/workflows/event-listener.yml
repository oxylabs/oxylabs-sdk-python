name: GitBook Event Receiver

on:
  repository_dispatch:
    types: [gitbook_update]
  workflow_dispatch:
    inputs:
      diff:
        description: 'Git diff content (for manual testing)'
        required: true
      changed_paths:
        description: 'Changed file paths (for manual testing)'
        required: true
      message:
        description: 'Commit message'
        required: false
        default: 'Manual test trigger'

jobs:
  create-sync-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.client_payload.author }}" >> $GITHUB_OUTPUT
            echo "message=${{ github.event.client_payload.message }}" >> $GITHUB_OUTPUT

            cat <<'EOF' > /tmp/diff.txt
          ${{ github.event.client_payload.diff }}
          EOF

            cat <<'EOF' > /tmp/paths.txt
          ${{ github.event.client_payload.changed_paths }}
          EOF
          else
            echo "sha=manual" >> $GITHUB_OUTPUT
            echo "author=manual" >> $GITHUB_OUTPUT
            echo "message=${{ github.event.inputs.message }}" >> $GITHUB_OUTPUT

            cat <<'EOF' > /tmp/diff.txt
          ${{ github.event.inputs.diff }}
          EOF

            cat <<'EOF' > /tmp/paths.txt
          ${{ github.event.inputs.changed_paths }}
          EOF
          fi

      - name: Ensure docs-sync label exists
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh label create "docs-sync" \
            --repo "${{ github.repository }}" \
            --description "Automated issue from GitBook documentation changes" \
            --color "1D76DB" \
            || true  # Ignore error if label already exists

      - name: Create GitHub Issue for Claude
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          COMMIT_SHA: ${{ steps.vars.outputs.sha }}
          COMMIT_AUTHOR: ${{ steps.vars.outputs.author }}
          COMMIT_MSG: ${{ steps.vars.outputs.message }}
        run: |
          DIFF_CONTENT=$(cat /tmp/diff.txt)
          CHANGED_PATHS=$(cat /tmp/paths.txt)

          # Build the issue body
          ISSUE_BODY="@claude

          ## Documentation Change Detected

          A documentation change was pushed to the GitBook repository that may require updates to this SDK.

          **Commit:** $COMMIT_SHA
          **Author:** $COMMIT_AUTHOR
          **Message:** $COMMIT_MSG

          ### Changed documentation paths

          \`\`\`
          $CHANGED_PATHS
          \`\`\`

          ### Diff

          \`\`\`diff
          $DIFF_CONTENT
          \`\`\`

          ## Instructions

          Analyze the documentation diff above and update the Python SDK source code to match.
          Follow the guidelines in CLAUDE.md for mapping documentation paths to SDK source files.

          After making changes:
          1. Create a new branch named docs-sync/$COMMIT_SHA
          2. Commit your changes
          3. Open a pull request with a summary of what changed and why"

          # Use jq to safely build JSON payload
          PAYLOAD=$(jq -n \
            --arg title "Docs sync: $COMMIT_MSG" \
            --arg body "$ISSUE_BODY" \
            '{title: $title, body: $body, labels: ["docs-sync"]}')

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "$PAYLOAD"
