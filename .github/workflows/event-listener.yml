name: GitBook Event Receiver

on:
  repository_dispatch:
    types: [gitbook_update]

jobs:
  process-gitbook-update:
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge Event
        run: |
          echo "🚀 Event Received from GitBook!"
          echo "Commit: ${{ github.event.client_payload.sha }}"
          echo "Author: ${{ github.event.client_payload.author }}"
          echo "Summary: ${{ github.event.client_payload.message }}"

      - name: Show Changed Paths
        run: |
          echo "The following filtered paths were modified:"
          echo "${{ github.event.client_payload.changed_paths }}"

      - name: View Detailed Diff
        run: |
          echo "--- START OF DIFF ---"
          echo "${{ github.event.client_payload.diff }}"
          echo "--- END OF DIFF ---"

      # EXAMPLE: Action based on specific path
      - name: Conditional Logic
        if: contains(github.event.client_payload.changed_paths, 'docs/api-reference')
        run: |
          echo "Detected change in API Reference. Triggering internal sync..."
          # Insert your custom command here (e.g., npm run build-docs)